Name: user.rpc
ListenOn: 0.0.0.0:5003

Etcd:
  Hosts:
  - ${ETCD_HOST}:2379
  Key: user.rpc

Telemetry:
  Name: user.rpc-server
  Endpoint: ${OTEL_ENDPOINT}
  Batcher: otlpgrpc
  Sampler: 1.0

Prometheus:
  Host: ${PROM_HOST}
  Port: 9294
  Path: /metrics

Log:
  ServiceName: "user.rpc"
  Mode: "file"
  Encoding: "json"
  TimeFormat: "2006-01-02T15:04:05.000Z07:00"
  Path: ${LOG_PATH}
  Level: "info"
  MaxContentLength: 0
  Compress: false
  Stat: true
  KeepDays: 1
  StackCooldownMillis: 100
  MaxBackups: 0
  MaxSize: 0
  Rotation: "daily"
  FileTimeFormat: "2006-01-02T15:04:05.000Z07:00"

InteractionRpcClientConf:
  Etcd:
    Hosts:
      - ${ETCD_HOST}:2379
    Key: interaction.rpc
  NonBlock: true

CountRpcClientConf:
  Etcd:
    Hosts:
      - ${ETCD_HOST}:2379
    Key: count.rpc
  NonBlock: true

RedisConfig:
  Host: ${REDIS_HOST}:6379
  Type: node
  Pass: ${REDIS_PASSWORD}

MySQL:
  DataSource: ${MYSQL_APP_USER}:${MYSQL_APP_PASSWORD}@tcp(${MYSQL_HOST}:3306)/ran-feed?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai

SessionTTL: 86400

Oss:
  Provider:
  Region:
  BucketName:
  AccessKeyId:
  AccessKeySecret:
  Endpoint:
  UploadDir:
  PublicHost:
